apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-frontend
  namespace: quiz-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz-frontend
  template:
    metadata:
      labels:
        app: quiz-frontend
    spec:
      containers:
        - name: frontend
          image: europe-west2-docker.pkg.dev/mac-terraform-state-12345/quiz-images/quiz-frontend:v4
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-frontend
  namespace: quiz-prod
spec:
  selector:
    app: quiz-frontend
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
