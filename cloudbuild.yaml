steps:
# Build image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/quiz-frontend:$SHORT_SHA', '.']

# Push image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/quiz-frontend:$SHORT_SHA']

# Update Kubernetes manifest (THIS is the key GitOps step)
- name: 'gcr.io/cloud-builders/git'
  entrypoint: bash
  args:
    - '-c'
    - |
      git config --global user.email "you@example.com"
      git config --global user.name "cloud-build"

      git clone https://github.com/macod-spec/reactjs-quiz-app.git
      cd reactjs-quiz-app

      sed -i "s|image:.*|image: gcr.io/$PROJECT_ID/quiz-frontend:$SHORT_SHA|g" k8s/frontend.yaml

      git add .
      git commit -m "Update image to $SHORT_SHA"
      git push https://$(gcloud secrets versions access latest --secret=github-token)@github.com/macod-spec/reactjs-quiz-app.git HEAD:master

images:
- 'gcr.io/$PROJECT_ID/quiz-frontend:$SHORT_SHA'
